version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grid_postgres
    environment:
      POSTGRES_DB: griddb
      POSTGRES_USER: grid
      POSTGRES_PASSWORD: grid
    ports:
      - "5433:5432"  # <-- Changed external port to 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: grid_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: